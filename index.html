<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Corporativo</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">🏢 Portal Corporativo</span>
</nav>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-2 bg-light sidebar p-3">
      <h6>Menu</h6>
      <ul class="nav flex-column">
        <li class="nav-item">Dashboard</li>
        <li class="nav-item">Notícias</li>
        <li class="nav-item">Documentos</li>
        <li class="nav-item">Calendário</li>
        <li class="nav-item">Usuários</li>
      </ul>
    </div>

    <!-- CONTENT -->
    <div class="col-md-10 p-4">

      <h3>Dashboard</h3>

      <!-- CARDS -->
      <div class="row g-3">

        <div class="col-md-3">
          <div class="card text-bg-primary">
            <div class="card-body">
              <h5>Usuários</h5>
              <p id="users">120</p>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card text-bg-success">
            <div class="card-body">
              <h5>Documentos</h5>
              <p>45</p>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card text-bg-warning">
            <div class="card-body">
              <h5>Eventos</h5>
              <p>8</p>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card text-bg-danger">
            <div class="card-body">
              <h5>Alertas</h5>
              <p>3</p>
            </div>
          </div>
        </div>

      </div>

      <hr>

      <!-- NOTÍCIAS -->
      <h4>📢 Notícias internas</h4>

      <div class="list-group" id="newsList">
        <div class="list-group-item">Sistema atualizado com novas funcionalidades</div>
        <div class="list-group-item">Reunião geral na sexta-feira</div>
      </div>

      <button class="btn btn-primary mt-3" onclick="addNews()">
        Adicionar notícia
      </button>

    </div>

  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="app.js"></script>

</body>
</html>
